name: CI — Typecheck + Build

on:
  pull_request:
  push:
    branches: [main, v2]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # No env vars: lib/supabase.ts degrades to offline/empty when
      # NEXT_PUBLIC_SUPABASE_* are absent, so the build is secret-free.
      - name: Build
        run: npm run build
